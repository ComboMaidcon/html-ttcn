<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đánh giá khách hàng – NOX Joy Station</title>
<link rel="stylesheet" href="style.css">
<style>
.rating-summary {
  display:flex; gap:2rem; align-items:center;
  background:var(--dark2); border:1px solid rgba(245,197,24,.15);
  border-radius:var(--radius); padding:2rem; margin-bottom:3rem;
  flex-wrap:wrap;
}
.rating-big { text-align:center; }
.rating-num { font-family:'Syne',sans-serif; font-size:4.5rem; font-weight:800; color:var(--gold); line-height:1; }
.rating-stars { font-size:1.4rem; color:var(--gold); letter-spacing:3px; margin:.3rem 0; }
.rating-count { font-size:.82rem; color:var(--muted); }
.rating-bars { flex:1; min-width:200px; }
.rbar-row { display:flex; align-items:center; gap:.8rem; margin-bottom:.5rem; }
.rbar-label { font-size:.82rem; color:var(--muted); width:40px; flex-shrink:0; }
.rbar-track { flex:1; height:8px; background:var(--dark3); border-radius:50px; overflow:hidden; }
.rbar-fill { height:100%; background:var(--gold); border-radius:50px; transition:width 1s ease; }
.rbar-count { font-size:.78rem; color:var(--muted); width:30px; text-align:right; flex-shrink:0; }
.rating-platforms { display:flex; flex-direction:column; gap:.8rem; }
.plat-item { display:flex; align-items:center; gap:.8rem; padding:.7rem 1rem; background:var(--dark3); border-radius:var(--radius-sm); border:1px solid rgba(245,197,24,.08); }
.plat-icon { font-size:1.3rem; }
.plat-name { font-size:.82rem; font-weight:600; color:var(--white); }
.plat-stars { color:var(--gold); font-size:.8rem; }

/* Filter */
.rv-filter { display:flex; gap:.6rem; flex-wrap:wrap; margin-bottom:2rem; }
.rv-filter-btn { background:var(--dark2); border:1px solid rgba(245,197,24,.12); border-radius:50px; padding:.4rem 1.1rem; font-size:.8rem; font-weight:600; color:var(--muted); cursor:pointer; transition:all var(--transition); }
.rv-filter-btn:hover, .rv-filter-btn.active { background:var(--gold-dim); border-color:var(--gold); color:var(--gold); }

/* Review grid */
.rv-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1.2rem; }
.rv-card {
  background:var(--dark2); border:1px solid rgba(245,197,24,.08);
  border-radius:var(--radius); padding:1.5rem;
  transition:border-color var(--transition);
  display:flex; flex-direction:column;
}
.rv-card:hover { border-color:rgba(245,197,24,.22); }
.rv-card-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:.8rem; }
.rv-stars { color:var(--gold); font-size:.9rem; letter-spacing:2px; }
.rv-platform { font-size:.68rem; color:var(--muted); }
.rv-text { font-size:.88rem; color:rgba(240,237,232,.72); line-height:1.75; flex:1; font-style:italic; margin-bottom:1.2rem; position:relative; }
.rv-text::before { content:'"'; font-family:'Bebas Neue',sans-serif; font-size:4rem; color:rgba(245,197,24,.08); position:absolute; top:-.5rem; left:-.5rem; line-height:1; pointer-events:none; }
.rv-footer { display:flex; align-items:center; justify-content:space-between; border-top:1px solid rgba(245,197,24,.06); padding-top:1rem; }
.rv-author { display:flex; align-items:center; gap:.7rem; }
.rv-av { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,var(--gold2),var(--gold)); display:flex; align-items:center; justify-content:center; font-weight:800; color:var(--black); font-size:.9rem; border:2px solid rgba(245,197,24,.25); flex-shrink:0; }
.rv-name { font-family:'Syne',sans-serif; font-weight:700; font-size:.8rem; }
.rv-sub { font-size:.72rem; color:var(--muted); margin-top:.1rem; }
.rv-room-tag { font-size:.68rem; font-weight:700; background:var(--gold-dim); border:1px solid rgba(245,197,24,.2); color:var(--gold); padding:.15rem .6rem; border-radius:50px; }
.rv-date { font-size:.72rem; color:var(--muted); }

@media(max-width:960px) {
  .rv-grid { grid-template-columns:1fr; }
  .section { padding:3rem 1.5rem; }
  .rating-summary { flex-direction:column; }
}
@media(max-width:600px){
  .rv-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div class="page-hero">
  <div class="page-hero-bg"></div>
  <div class="page-hero-grid"></div>
  <div class="page-hero-content">
    <div class="page-hero-label">Đánh giá</div>
    <h1>Khách hàng <span>nói gì</span></h1>
    <p>Hơn 500 đánh giá 5★ từ khách hàng thực tế trên Facebook, TikTok và Google Maps.</p>
  </div>
</div>

<section class="section">
  <div class="section-inner">
    <!-- Rating summary -->
    <div class="rating-summary rev">
      <div class="rating-big">
        <div class="rating-num">4.9</div>
        <div class="rating-stars">★★★★★</div>
        <div class="rating-count">500+ đánh giá</div>
      </div>
      <div class="rating-bars">
        <div class="rbar-row"><span class="rbar-label">5★</span><div class="rbar-track"><div class="rbar-fill" style="width:92%"></div></div><span class="rbar-count">460</span></div>
        <div class="rbar-row"><span class="rbar-label">4★</span><div class="rbar-track"><div class="rbar-fill" style="width:6%"></div></div><span class="rbar-count">30</span></div>
        <div class="rbar-row"><span class="rbar-label">3★</span><div class="rbar-track"><div class="rbar-fill" style="width:1.5%"></div></div><span class="rbar-count">8</span></div>
        <div class="rbar-row"><span class="rbar-label">2★</span><div class="rbar-track"><div class="rbar-fill" style="width:.5%"></div></div><span class="rbar-count">2</span></div>
        <div class="rbar-row"><span class="rbar-label">1★</span><div class="rbar-track"><div class="rbar-fill" style="width:0%"></div></div><span class="rbar-count">0</span></div>
      </div>
      <div class="rating-platforms">
        <div class="plat-item"><span class="plat-icon">📘</span><div><div class="plat-name">Facebook</div><div class="plat-stars">★★★★★ · 4.9/5</div></div></div>
        <div class="plat-item"><span class="plat-icon">🎵</span><div><div class="plat-name">TikTok</div><div class="plat-stars">Trending · 200K+ views</div></div></div>
        <div class="plat-item"><span class="plat-icon">🗺️</span><div><div class="plat-name">Google Maps</div><div class="plat-stars">★★★★★ · 4.8/5</div></div></div>
      </div>
    </div>

    <!-- Filter -->
    <div class="rv-filter" id="rvFilter">
      <button class="rv-filter-btn active" data-type="">Tất cả</button>
      <button class="rv-filter-btn" data-type="couple">💑 Couple</button>
      <button class="rv-filter-btn" data-type="group">👯 Nhóm bạn</button>
      <button class="rv-filter-btn" data-type="party">🎉 Sinh nhật</button>
      <button class="rv-filter-btn" data-type="ps5">🎮 PS5</button>
    </div>

    <!-- Reviews grid -->
    <div class="rv-grid" id="rvGrid"></div>
  </div>
</section>

<script src="data.js"></script>
<script src="components.js"></script>
<script>
injectShared({ ticker: false });
initPage();

const REVIEWS = [
  { name:'Anh Thư', init:'A', sub:'Khách quen · Hoàn Kiếm', stars:5, type:'couple', room:'Couple Box', date:'3 ngày trước', platform:'Facebook', text:'Địa điểm hẹn hò cực kỳ ổn! Mình với người yêu đặt Couple Box, chơi It Takes Two rồi xem Netflix — riêng tư tuyệt đối, nhân viên không làm phiền. Không gian ấm cúng lắm. Sẽ quay lại tuần sau!' },
  { name:'Minh Khang', init:'M', sub:'TikTok · @minhkhang.fun', stars:5, type:'party', room:'Party Room', date:'1 tuần trước', platform:'TikTok', text:'Cả hội 8 người kéo đến chơi Party Room sinh nhật. Chơi Mario Kart mà cười rớt hàm luôn 😂 Phòng rộng, cách âm tốt, giá hợp lý nữa. Top tier address Hà Nội luôn!' },
  { name:'Linh Phương', init:'L', sub:'Review food & fun', stars:5, type:'group', room:'Boardgame Lounge', date:'5 ngày trước', platform:'Google', text:'Không gian sạch sẽ, thoáng, boardgame nhiều lắm mà lại free nữa. Nhân viên dễ thương, order đồ ăn nhanh. Chỉ 25k/người mà vui hơn đi bar nhiều! Đã rủ cả hội 7 người đến.' },
  { name:'Tiến Đạt', init:'T', sub:'Gamer · Cầu Giấy', stars:5, type:'ps5', room:'PS5 Room A', date:'2 tuần trước', platform:'Facebook', text:'Thấy trên TikTok rồi rủ nhóm bạn đến thử. Đặt phòng Nintendo, chơi Overcooked — ôi thôi cả phòng toàn tiếng hét. Cực vui! PS5 nhiều game xịn, TV lớn đẹp, giá rẻ không ngờ.' },
  { name:'Hà Anh', init:'H', sub:'Khách quen · Đống Đa', stars:5, type:'group', room:'Nintendo Room', date:'3 tuần trước', platform:'Google', text:'Mình với nhóm bạn thân hay đến vào cuối tuần. Lần nào cũng vui. Boardgame nhiều và đa dạng, chơi hoài không hết. Nhân viên nhiệt tình hướng dẫn luật chơi cho người mới.' },
  { name:'Nam Khánh', init:'N', sub:'PS5 enthusiast', stars:5, type:'ps5', room:'PS5 Room B', date:'1 tháng trước', platform:'Facebook', text:'PS5 ở đây nhiều game hay lắm, kho game update đều đặn. Chơi xong lại nhờ nhân viên gợi ý game mới, họ rành và nhiệt tình tư vấn. TV 4K chơi game rất đã.' },
  { name:'Bảo Châu', init:'B', sub:'Content creator · HN', stars:5, type:'couple', room:'Cine Private', date:'2 tuần trước', platform:'TikTok', text:'Đặt phòng Cine cho date night — màn chiếu lớn, sofa êm, xem Spider-Man mà cảm giác như rạp tư nhân. Giá 35k/người rẻ hơn đi rạp mà riêng tư hơn nhiều. 11/10!' },
  { name:'Quốc Hùng', init:'Q', sub:'Coder · Cầu Giấy', stars:5, type:'group', room:'Boardgame', date:'1 tuần trước', platform:'Google', text:'Sau giờ làm việc căng thẳng, cả team 5 người rủ nhau đến NOX quẩy Catan. Không gian thoải mái, boardgame nhiều loại từ dễ đến khó. Ăn snack, uống nước — stress bay hết.' },
  { name:'Thu Hà', init:'T', sub:'Sinh viên · Hai Bà Trưng', stars:5, type:'party', room:'Party Room', date:'10 ngày trước', platform:'Facebook', text:'Tổ chức sinh nhật bạn thân ở đây — book Party Room, mang bánh vào, quẩy đến 1 giờ sáng. Nhân viên cho phép mang bánh không thu phí. Cả hội đều thích, năm sau chắc chắn quay lại!' },
];

let activeType = '';

document.getElementById('rvFilter').addEventListener('click', e => {
  const btn = e.target.closest('.rv-filter-btn');
  if (!btn) return;
  activeType = btn.dataset.type;
  document.querySelectorAll('.rv-filter-btn').forEach(b => b.classList.toggle('active', b === btn));
  renderReviews();
});

function renderReviews() {
  const reviews = activeType ? REVIEWS.filter(r => r.type === activeType) : REVIEWS;
  document.getElementById('rvGrid').innerHTML = reviews.map(r => `
    <div class="rv-card">
      <div class="rv-card-header">
        <div class="rv-stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</div>
        <span class="rv-platform">${r.platform}</span>
      </div>
      <p class="rv-text">${r.text}</p>
      <div class="rv-footer">
        <div class="rv-author">
          <div class="rv-av">${r.init}</div>
          <div><div class="rv-name">${r.name}</div><div class="rv-sub">${r.sub}</div></div>
        </div>
        <div style="text-align:right">
          <div class="rv-room-tag">${r.room}</div>
          <div class="rv-date" style="margin-top:.3rem">${r.date}</div>
        </div>
      </div>
    </div>`).join('');
}

renderReviews();
</script>
</body>
</html>
