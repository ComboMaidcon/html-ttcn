<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – NOX Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- Login screen -->
  <div id="loginScreen">
    <div class="login-card">
      <div class="login-logo">🎮</div>
      <div class="login-title">NOX <span>Admin</span></div>
      <div class="login-sub">Quản lý menu & thực đơn</div>
      <input type="password" id="pwInput" placeholder="Nhập mật khẩu...">
      <div class="login-err" id="loginErr">❌ Sai mật khẩu. Thử lại!</div>
      <button class="btn-add" onclick="doLogin()">Đăng nhập →</button>
      <div class="login-hint">Mật khẩu mặc định: <strong>nox2025</strong></div>
    </div>
  </div>

  <!-- Admin app -->
  <div id="adminApp">
    <div class="admin-header">
      <div class="admin-logo">NOX <span>Admin</span> · Menu</div>
      <div class="admin-nav">
        <button class="an-btn"        onclick="location.href='menu.html'">👁 Xem menu</button>
        <button class="an-btn"        onclick="exportData()">📥 Export JSON</button>
        <button class="an-btn danger" onclick="confirmReset()">↺ Reset mặc định</button>
        <button class="an-btn"        onclick="logout()">Đăng xuất</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-bar" id="statsBar"></div>

    <!-- Add form -->
    <div class="add-form-wrap">
      <div class="add-form-title">+ Thêm món mới</div>
      <div class="add-grid">
        <div class="fg"><span class="fl">Tên món *</span>
          <input id="aName" placeholder="Vd: Trà Đào Matcha"></div>
        <div class="fg"><span class="fl">Giá (K) *</span>
          <input id="aPrice" type="number" min="1" placeholder="25"></div>
        <div class="fg"><span class="fl">Loại *</span>
          <select id="aTab">
            <option value="drink">🧃 Đồ uống</option>
            <option value="food" >🍕 Đồ ăn</option>
          </select>
        </div>
        <div class="fg"><span class="fl">Danh mục *</span>
          <select id="aCat"></select>
        </div>
      </div>
      <div class="add-grid-2">
        <div class="fg"><span class="fl">Mô tả</span>
          <input id="aDesc" placeholder="Vd: Thơm mát, ít đường"></div>
        <div class="fg"><span class="fl">Biến thể</span>
          <input id="aVariants" placeholder="Vd: Size M · Size L"></div>
        <div class="fg"><span class="fl">&nbsp;</span>
          <button class="btn-add" onclick="doAdd()">+ Thêm món</button>
        </div>
      </div>
    </div>

    <!-- Filter + table -->
    <div class="cat-filter" id="catFilter"></div>
    <div class="items-table-wrap">
      <div class="it-head">
        <span>Tên món</span>
        <span>Giá</span>
        <span class="col-cat">Danh mục</span>
        <span>Loại</span>
        <span>Trạng thái</span>
        <span>Hành động</span>
      </div>
      <div id="itemsList"></div>
    </div>
  </div>

  <!-- Edit modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-title">✏️ Chỉnh sửa món</div>
      <div class="modal-grid">
        <div class="fg" style="grid-column:1/-1">
          <span class="fl">Tên món</span><input id="eName">
        </div>
        <div class="fg"><span class="fl">Giá (K)</span>
          <input id="ePrice" type="number"></div>
        <div class="fg"><span class="fl">Loại</span>
          <select id="eTab">
            <option value="drink">Đồ uống</option>
            <option value="food" >Đồ ăn</option>
          </select>
        </div>
        <div class="fg"><span class="fl">Danh mục</span>
          <select id="eCat"></select>
        </div>
        <div class="fg"><span class="fl">Mô tả</span>
          <input id="eDesc"></div>
        <div class="fg" style="grid-column:1/-1">
          <span class="fl">Biến thể</span><input id="eVariants">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">Hủy</button>
        <button class="btn-save"   onclick="doSaveEdit()">Lưu thay đổi</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/utils.js"      defer></script>
  <script src="js/menu-data.js"  defer></script>
  <script src="js/admin.js"      defer></script>
</body>
</html>
